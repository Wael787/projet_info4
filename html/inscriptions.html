<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="../css/style.css"> 
</head>
<body>
    <header>
        <h1>Créer un compte</h1>
    </header>

    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Informations Personnelles</legend>
                
                <label for="nom">* Nom :</label>
                <input type="text" id="nom" name="nom" required>

                <label for="prenom">* Prénom :</label>
                <input type="text" id="prenom" name="prenom" required>

                <label for="tel">* Numéro de téléphone :</label>
                <input type="tel" id="tel" name="tel" placeholder="XXXXXXXXXX" required>
            </fieldset>

            <fieldset>
                <legend>Coordonnées de Livraison</legend>
                
                <label for="adresse">* Adresse complète :</label>
                <input type="text" id="adresse" name="adresse" required>

                <label for="infos_comp">Informations complémentaires (code, étage...) :</label>
                <textarea id="infos_comp" name="infos_comp" rows="3"></textarea>
            </fieldset>

            <fieldset>
                <legend>Sécurité</legend>
                
                <label for="email">* E-mail :</label>
                <input type="email" id="email" name="email" required>

                <label for="password">* Mot de passe :</label>
                <input type="password" id="password" name="password" required>
            </fieldset>
			<input type="checkbox" id="se_souvenir" name="se_souvenir">
			<label for="se_souvenir">Se souvenir de moi</label>
			<br>
			
            <button type="submit">S'inscrire</button>
        </form>
    </main>
	
</body>

</html>
