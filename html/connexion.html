<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Connexion</title>
	<link rel="stylesheet" type="text/css" href="../css/style.css">
</head>
<body>
	<header>
		<h1>Se connecter</h1>
  </header>
				<main class="login-container">
					<form action="#" method="POST">
						<h2>Accès à votre compte</h2>
        
						<label for="email">* E-mail :</label>
						<input type="email" id="email" name="email" required>
            <br>

						<label for="password">* Mot de passe :</label>
						<input type="password" id="password" name="password" required>

						<div class="options">
							<input type="checkbox" id="se_souvenir" name="se_souvenir">
							<label for="se_souvenir">Se souvenir de moi</label>
						</div>

						<button type="submit">Se connecter</button>

						<p class="footer-form">
							<a href="../jdk_projet/password-forgot.html">Mot de passe oublié ?</a><br>
							Nouveau sur Jdk ? <a href="../jdk_projet/inscriptions.html">Créer un compte</a>
						</p>
					</form>
				</main>
</body>
</html>
